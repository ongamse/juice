name: "My Custom CodeQL Config"

# 禁用默认查询，因为我们在 workflow 里指定了 'security-and-quality'
# disable-default-queries: true 

# 👇 你的过滤逻辑全部在这里
paths-ignore:
  # -----------------------------
  # 1. 核心依赖与构建
  # -----------------------------
  - 'node_modules'
  - 'dist'
  - '.tmp'
  - '.angular'

  # -----------------------------
  # 2. 第三方资源与库 (关键降噪)
  # -----------------------------
  - 'frontend/src/assets'  # 排除整个静态资源目录
  - '**/*.min.js'          # ⚠️ 必须加上 **/ 才能匹配任意子目录下的 min.js

  # -----------------------------
  # 3. 测试文件 (排除 Hardcoded Secret 误报)
  # -----------------------------
  - 'test'
  - '**/*.spec.ts'         # 排除散落在各处的单元测试
  - 'cypress.config.ts'

  # -----------------------------
  # 4. 其它非业务逻辑目录
  # -----------------------------
  - 'ftp'
  - 'data'
  - 'vagrant'
  - 'i18n'
  - 'encryptionkeys'
  - '.github'              # 排除 Action 自身的配置
  - 'Dockerfile'

  # -----------------------------
  # 5. 文档与非代码文件
  # -----------------------------
  # CodeQL 主要是分析代码逻辑，排除这些能显著加快分析速度
  - '**/*.md'
  - 'LICENSE'
  - '**/*.json'            # 排除 JSON 防止 CodeQL 分析数据文件
  - '**/*.lock'
  - '**/*.yaml'
  - '**/*.yml'