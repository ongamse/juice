name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    name: DockerX build and wiz CLI scan
    runs-on: ubuntu-latest
    env:
      IMAGE_SCAN_PATH: "."
      CODE_POLICY: "jibaek vulnerabilities policy"
      IMAGE_POLICY: "jibaek SAST policy"
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name : Check out repository code
        uses: actions/checkout@v4


      - name: Azure Login
        uses: Azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}


      - name: 'Acr login'
        run: |
          az acr login --name jibaek


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short ${{ github.sha }})
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_ENV


      - name: Build and push Docker image to Artifact Registry
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          load: true
          tags: |
            ${{ vars.ACR_PATH }}/${{ github.event.repository.name }}/${{ github.event.repository.name }}:${{ env.COMMIT_SHORT_SHA }}
            ${{ vars.ACR_PATH }}/${{ github.event.repository.name }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      

      - name: Download Wiz CLI
        run: curl -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64 && chmod +x wizcli


      - name: Run wiz-cli SAST scan
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: ./wizcli scan dir $IMAGE_SCAN_PATH --policies "$CODE_POLICY"
     

      - name: Run wiz-cli container image scan
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: ./wizcli scan container-image ${{ vars.ACR_PATH }}/${{ github.event.repository.name }}/${{ github.event.repository.name }}:${{ env.COMMIT_SHORT_SHA }} --policies "$IMAGE_POLICY"


      # - name: Authenticate to Wiz
      #   run: ./wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
      #   env:
      #     WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      #     WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}


      # - name: Run wiz-cli docker image scan
      #   run: ./wizcli scan container-image ${{ vars.ACR_PATH }}/${{ github.event.repository.name }}/${{ github.event.repository.name }}:${{ env.COMMIT_SHORT_SHA }} --policies "$POLICY"


      - name: Fetch digest of Docker image for Graph enrichment
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli tag ${{ vars.ACR_PATH }}/${{ github.event.repository.name }}/${{ github.event.repository.name }}:${{ env.COMMIT_SHORT_SHA }} \
            --digest "${{ steps.build-image.outputs.digest }}"
      

      - name: Finish Image Publish
        run: |
          echo "🎉 Finish Image Publish!!!!!!!! 🎉"