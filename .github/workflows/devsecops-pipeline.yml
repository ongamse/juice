name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  NODE_VERSION: "20.x"
  DOCKER_IMAGE_NAME: juice-shop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm test
        continue-on-error: true

      - run: npm run build:server

      - name: Build & save Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} .
          docker save ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} -o juice-shop-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: juice-shop-image.tar
          retention-days: 1

  sast:
    name: SAST
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --json --output semgrep-results.json || true
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: semgrep-results.json
          retention-days: 7

  sca:
    name: SCA
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i juice-shop-image.tar

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln"
          vuln-type: "os,library"
          format: "json"
          output: "trivy-fs-results.json"
        continue-on-error: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}"
          scanners: "vuln"
          vuln-type: "os,library"
          format: "json"
          output: "trivy-image-results.json"
        continue-on-error: true

      - name: Enrich Trivy scan results with EPSS scores
        run: |
          python3 - <<'PY'
          import json
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          CVE_PATTERN = re.compile(r'\bCVE-\d{4}-\d{4,}\b', re.IGNORECASE)
          EPSS_API_URL = 'https://api.first.org/data/v1/epss'
          CHUNK_SIZE = 100

          def extract_cves(vulnerability):
            values = [
              vulnerability.get('VulnerabilityID', ''),
              vulnerability.get('PrimaryURL', ''),
              vulnerability.get('Title', ''),
            ]
            values.extend(vulnerability.get('References', []) or [])

            cves = []
            for value in values:
              if not isinstance(value, str):
                continue
              for match in CVE_PATTERN.findall(value):
                cve = match.upper()
                if cve not in cves:
                  cves.append(cve)
            return cves

          def fetch_epss(cves):
            scores = {}
            ordered = sorted(cves)

            for index in range(0, len(ordered), CHUNK_SIZE):
              chunk = ordered[index:index + CHUNK_SIZE]
              query = urllib.parse.urlencode({'cve': ','.join(chunk)})
              request = urllib.request.Request(
                f'{EPSS_API_URL}?{query}',
                headers={'User-Agent': 'juice-shop-devsecops-pipeline'},
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                payload = json.loads(response.read().decode('utf-8'))
              for item in payload.get('data', []):
                cve = item.get('cve')
                if cve:
                  scores[cve.upper()] = item
            return scores

          files = sorted(Path.cwd().glob('trivy-*.json'))
          if not files:
            print('No Trivy JSON files found, skipping EPSS enrichment')
            raise SystemExit(0)

          documents = []
          all_cves = set()

          for path in files:
            try:
              with path.open(encoding='utf-8') as handle:
                data = json.load(handle)
            except FileNotFoundError:
              print(f'{path.name}: file not found, skipping')
              continue
            except json.JSONDecodeError as exc:
              print(f'{path.name}: invalid JSON ({exc}), skipping')
              continue

            documents.append((path, data))
            for result in data.get('Results', []):
              for vulnerability in result.get('Vulnerabilities', []) or []:
                all_cves.update(extract_cves(vulnerability))

          if not documents:
            print('No readable Trivy JSON files found, skipping EPSS enrichment')
            raise SystemExit(0)

          if not all_cves:
            print('No CVE identifiers or aliases found in Trivy results, skipping EPSS enrichment')
            raise SystemExit(0)

          try:
            epss_scores = fetch_epss(all_cves)
          except Exception as exc:
            print(f'EPSS API lookup failed: {exc}')
            raise SystemExit(0)

          for path, data in documents:
            enriched_count = 0
            for result in data.get('Results', []):
              for vulnerability in result.get('Vulnerabilities', []) or []:
                cves = extract_cves(vulnerability)
                match = next((cve for cve in cves if cve in epss_scores), None)
                if not match:
                  continue
                vulnerability['EPSS'] = float(epss_scores[match]['epss'])
                vulnerability['EPSSPercentile'] = float(epss_scores[match]['percentile'])
                enriched_count += 1

            with path.open('w', encoding='utf-8') as handle:
              json.dump(data, handle)

            print(f'{path.name}: enriched {enriched_count} vulnerabilities with EPSS scores')
          PY
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate lock files for Dependency-Check
        run: |
          npm install --package-lock-only --ignore-scripts
          cd frontend && npm install --package-lock-only --ignore-scripts

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "juice-shop"
          path: "."
          format: "XML"
          out: "."
          args: '--exclude "**/test/files/**"'
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            trivy-fs-results.json
            trivy-image-results.json
            dependency-check-report.xml
          retention-days: 7

  dast:
    name: DAST
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i juice-shop-image.tar

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 $DOCKER_IMAGE_NAME:${{ github.sha }}
          for i in {1..30}; do
            curl -sf http://localhost:3000 > /dev/null && break
            [ $i -eq 30 ] && exit 1
            sleep 5
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-j -x report_xml.xml"
          allow_issue_writing: false
        continue-on-error: true

      - name: Stop Juice Shop
        if: always()
        run: docker stop juice-shop && docker rm juice-shop

      - uses: actions/upload-artifact@v4
        with:
          name: dast-results
          path: |
            report_html.html
            report_json.json
            report_xml.xml
          retention-days: 7

  defectdojo-upload:
    name: DefectDojo Upload
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sast-results
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: sca-results
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: dast-results
        continue-on-error: true

      - name: Upload to DefectDojo
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_TOKEN: ${{ secrets.DEFECTDOJO_API_TOKEN }}
          PRODUCT_NAME: "OWASP Juice Shop"
          ENGAGEMENT_NAME: "CI/CD Security Scans"
          BUILD_ID: "${{ github.run_id }}"
          COMMIT_HASH: "${{ github.sha }}"
          BRANCH_TAG: "${{ github.ref_name }}"
          SOURCE_CODE_MANAGEMENT_URI: "${{ github.server_url }}/${{ github.repository }}"
        run: |
          chmod +x .github/scripts/defectdojo-upload.sh
          .github/scripts/defectdojo-upload.sh
        continue-on-error: true

      - name: Summary
        run: |
          echo "## DefectDojo Integration Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Engagement**: CI/CD Security Scans" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
